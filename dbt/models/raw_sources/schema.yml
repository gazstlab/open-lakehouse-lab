---
version: 2

models:
  - name: generic_raw_contract
    description: Generic Raw contract used by dbt before concrete source adapters are implemented.
    columns:
      - name: source
        description: Logical source adapter name.
        tests:
          - not_null
      - name: dataset
        description: Logical dataset produced by the source adapter.
        tests:
          - not_null
      - name: ingestion_date
        description: Date partition associated with the Raw landing event.
        tests:
          - not_null
      - name: loaded_at
        description: Timestamp when the event was loaded into the Raw contract.
        tests:
          - not_null
      - name: record_hash
        description: Stable technical key for the Raw record.
        tests:
          - not_null
          - unique
      - name: raw_payload
        description: Original payload preserved when useful for audit and replay.
        tests:
          - not_null
      - name: observed_at
        description: Event timestamp extracted from the controlled fixture payload.
        tests:
          - not_null
      - name: metric_name
        description: Controlled fixture metric name.
        tests:
          - not_null
      - name: metric_value
        description: Controlled fixture metric value.
        tests:
          - not_null

seeds:
  - name: raw_source_events
    description: Local fixture that simulates canonical Raw Parquet rows without external ingestion.
    columns:
      - name: source
        tests:
          - not_null
      - name: dataset
        tests:
          - not_null
      - name: ingestion_date
        tests:
          - not_null
      - name: loaded_at
        tests:
          - not_null
      - name: record_hash
        tests:
          - not_null
          - unique
      - name: raw_payload
        tests:
          - not_null
      - name: observed_at
        tests:
          - not_null
      - name: metric_name
        tests:
          - not_null
      - name: metric_value
        tests:
          - not_null
