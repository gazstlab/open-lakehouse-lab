---
name: open_lakehouse_lab
version: 0.1.0
config-version: 2

profile: open_lakehouse_lab

model-paths:
  - models
analysis-paths:
  - analyses
test-paths:
  - tests
seed-paths:
  - seeds
macro-paths:
  - macros
snapshot-paths:
  - snapshots

target-path: target
clean-targets:
  - target
  - dbt_packages

vars:
  polaris_catalog_name: "{{ env_var('DBT_POLARIS_CATALOG_NAME', 'lakehouse') }}"
  polaris_endpoint: "{{ env_var('DBT_POLARIS_ENDPOINT', 'http://localhost:8181/api/catalog') }}"
  polaris_warehouse: "{{ env_var('DBT_POLARIS_WAREHOUSE', env_var('DBT_POLARIS_CATALOG_NAME', 'lakehouse')) }}"
  raw_fixture_root: "{{ env_var('DBT_RAW_FIXTURE_ROOT', 's3://lakehouse/raw') }}"
  raw_source_events_path: "{{ env_var('DBT_RAW_SOURCE_EVENTS_PATH', 's3://lakehouse/raw/*/*/*/*.parquet') }}"
  raw_contract_columns:
    - source
    - dataset
    - ingestion_date
    - loaded_at
    - record_hash
    - raw_payload

models:
  open_lakehouse_lab:
    +materialized: view
    raw_sources:
      +schema: raw_sources
    staging:
      +schema: staging
    silver:
      +schema: silver
    intermediate:
      +schema: intermediate
    marts:
      +schema: marts

on-run-start:
  - "{{ attach_polaris_catalog() }}"

seeds:
  open_lakehouse_lab:
    +schema: raw_sources
    +quote_columns: false
