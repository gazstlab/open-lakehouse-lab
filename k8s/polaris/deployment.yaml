---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: polaris
  namespace: data-platform
  labels:
    app.kubernetes.io/name: polaris
    app.kubernetes.io/component: catalog
    app.kubernetes.io/part-of: open-lakehouse-lab
    open-lakehouse-lab/stage: "04"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: polaris
      app.kubernetes.io/component: catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: polaris
        app.kubernetes.io/component: catalog
        app.kubernetes.io/part-of: open-lakehouse-lab
        open-lakehouse-lab/stage: "04"
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: polaris
          image: apache/polaris:1.4.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          ports:
            - name: catalog-api
              containerPort: 8181
              protocol: TCP
            - name: management
              containerPort: 8182
              protocol: TCP
          env:
            - name: POLARIS_ROOT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: polaris-local-credentials
                  key: POLARIS_ROOT_CLIENT_ID
            - name: POLARIS_ROOT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: polaris-local-credentials
                  key: POLARIS_ROOT_CLIENT_SECRET
            - name: POLARIS_BOOTSTRAP_CREDENTIALS
              value: "POLARIS,$(POLARIS_ROOT_CLIENT_ID),$(POLARIS_ROOT_CLIENT_SECRET)"
            - name: POLARIS_REALM_CONTEXT_REALMS
              value: POLARIS
            - name: POLARIS_PERSISTENCE_TYPE
              value: in-memory
            - name: QUARKUS_OTEL_SDK_DISABLED
              value: "true"
            - name: AWS_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: polaris-local-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: polaris-local-credentials
                  key: AWS_SECRET_ACCESS_KEY
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: management
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
