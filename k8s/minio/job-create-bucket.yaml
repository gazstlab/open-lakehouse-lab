---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: data-platform
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: bucket-bootstrap
    app.kubernetes.io/part-of: open-lakehouse-lab
    open-lakehouse-lab/stage: "03"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: bucket-bootstrap
        app.kubernetes.io/part-of: open-lakehouse-lab
        open-lakehouse-lab/stage: "03"
    spec:
      restartPolicy: OnFailure
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: create-bucket
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: minio-root-credentials
          env:
            - name: MC_CONFIG_DIR
              value: /tmp/.mc
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set local http://minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"; do
                echo "Waiting for MinIO to accept connections..."
                sleep 2
              done

              mc mb --ignore-existing local/lakehouse
              printf "" | mc pipe local/lakehouse/raw/.keep
              printf "" | mc pipe local/lakehouse/warehouse/.keep
              printf "" | mc pipe local/lakehouse/metadata/.keep
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
